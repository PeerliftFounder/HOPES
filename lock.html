<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lock Screen - Step 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #050505; color: white; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .neon-purple { text-shadow: 0 0 10px #c026d3, 0 0 20px #c026d3; box-shadow: 0 0 15px rgba(192, 38, 211, 0.4); border: 1px solid #c026d3; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden font-sans">
  
  <!-- Neon dimming focus light -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-fuchsia-600/20 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="glass p-12 rounded-2xl w-80 relative z-10 flex flex-col items-center shadow-2xl text-center">
    <!-- Lock Icon placeholder -->
    <div class="w-16 h-16 rounded-full border-2 border-gray-400 flex items-center justify-center mb-6">
      <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
    </div>
    
    <h2 class="text-xl font-medium mb-2 text-gray-300">System Locked</h2>
    <p class="text-xs text-gray-500 mb-8">Authentication required to proceed.</p>
    
    <!-- This links to Page 3 -->
    <a href="home.html" class="neon-purple px-8 py-2 rounded-full font-semibold tracking-wide text-fuchsia-400 hover:bg-fuchsia-500 hover:text-white transition-all duration-300">
      LODGE
    </a>
  </div>

</body>
</html>
