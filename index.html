<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Step 1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #050505; color: white; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .neon-cyan { text-shadow: 0 0 10px #06b6d4, 0 0 20px #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); border: 1px solid #06b6d4; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden font-sans">
  
  <!-- Neon dimming focus light -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-cyan-600/20 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="glass p-10 rounded-2xl w-80 relative z-10 flex flex-col items-center shadow-2xl">
    <h1 class="text-3xl font-bold mb-8 tracking-widest text-gray-200">LOGIN</h1>
    
    <div class="w-full mb-6">
      <input type="text" placeholder="Username" class="w-full bg-transparent border-b border-gray-600 p-2 text-sm focus:outline-none focus:border-cyan-400 transition-colors">
    </div>
    <div class="w-full mb-10">
      <input type="password" placeholder="Password" class="w-full bg-transparent border-b border-gray-600 p-2 text-sm focus:outline-none focus:border-cyan-400 transition-colors">
    </div>
    
    <!-- This links to Page 2 -->
    <a href="lock.html" class="neon-cyan px-8 py-2 rounded-full font-semibold tracking-wide text-cyan-400 hover:bg-cyan-400 hover:text-black transition-all duration-300">
      LOGIN
    </a>
  </div>

</body>
</html>
