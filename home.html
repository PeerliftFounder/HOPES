<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Step 3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #050505; color: white; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .neon-green { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
  </style>
</head>
<body class="min-h-screen relative overflow-hidden font-sans p-8">
  
  <!-- Neon dimming focus light -->
  <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-green-600/10 rounded-full blur-[120px] pointer-events-none"></div>

  <nav class="glass px-6 py-4 rounded-xl flex justify-between items-center mb-10 relative z-10">
    <div class="text-xl font-bold tracking-widest text-gray-200">WORKSPACE</div>
    <a href="index.html" class="text-sm text-gray-400 hover:text-white transition">Log Out</a>
  </nav>

  <main class="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10">
    <div class="glass p-8 rounded-2xl h-64 flex flex-col justify-center items-center neon-green border-t border-green-500/30">
      <h3 class="text-2xl mb-2">Welcome In.</h3>
      <p class="text-gray-400 text-sm">System successfully lodged.</p>
    </div>
    
    <div class="glass p-8 rounded-2xl h-64 col-span-1 md:col-span-2">
      <!-- Empty space for your future features -->
      <p class="text-gray-500 italic">Feature dashboard pending...</p>
    </div>
  </main>

</body>
</html>
